<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Araz ❤️ Eli</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#12001f,#330033,#ff6fb5);
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
50%{
opacity:.2;
transform:scale(.3);
}
}

.heart{
position:absolute;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.card{
position:relative;
z-index:10;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:35px;
border-radius:25px;
text-align:center;
color:#fff;
box-shadow:0 0 30px rgba(255,255,255,.2);
}

h1{
font-size:42px;
animation:beat 1s infinite;
}

@keyframes beat{
50%{
transform:scale(1.08);
}
}

p{
margin-top:15px;
font-size:18px;
}

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff2d75;
color:#fff;
font-size:18px;
cursor:pointer;
}

#msg{
display:none;
margin-top:25px;
line-height:2;
font-size:20px;
}
</style>

</head>

<body>

<div class="card">

<h1>Araz ❤️ Eli</h1>

<p>Welcome My Love 💖</p>

<button onclick="openLove()">
Open My Heart ❤️
</button>

<div id="msg">

🌹 Eli 🌹

<br><br>

لە هەر هەناسەیەکمدا تۆ هەی.

<br><br>

❤️ هەمیشە خۆشم دەوێیت ❤️

<br><br>

<b>27 / 11 / 2025 ♾️</b>

</div>

</div>

<script>

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

for(let i=0;i<70;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"🌹";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*5)+"s";

h.style.animationDelay=Math.random()*5+"s";

h.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(h);

}

function openLove(){

document.getElementById("msg").style.display="block";

}

</script>

</body>
</html>

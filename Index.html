<!DOCTYPE html>
<html lang="ku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Araz ❤️ Eli</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:linear-gradient(180deg,#12001f,#330033,#ff6fb5);
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite;
}

@keyframes twinkle{
50%{
opacity:.2;
transform:scale(.3);
}
}

.heart{
position:absolute;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-100px);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(110vh);
opacity:0;
}
}

.card{
position:relative;
z-index:10;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
padding:35px;
border-radius:25px;
text-align:center;
color:#fff;
box-shadow:0 0 30px rgba(255,255,255,.2);
}

h1{
font-size:42px;
animation:beat 1s infinite;
}

@keyframes beat{
50%{
transform:scale(1.08);
}
}

p{
margin-top:15px;
font-size:18px;
}

button{
margin-top:25px;
padding:14px 28px;
border:none;
border-radius:30px;
background:#ff2d75;
color:#fff;
font-size:18px;
cursor:pointer;
}

#msg{
display:none;
margin-top:25px;
line-height:2;
font-size:20px;
}
</style>

</head>

<body>

<div class="card">

<h1>Araz ❤️ Eli</h1>

<p>Welcome My Love 💖</p>

<button onclick="openLove()">
Open My Heart ❤️
</button>

<div id="msg">

🌹 Eli 🌹

<br><br>

لە هەر هەناسەیەکمدا تۆ هەی.

<br><br>

❤️ هەمیشە خۆشم دەوێیت ❤️

<br><br>

<b>27 / 11 / 2025 ♾️</b>

</div>

</div>

<script>

for(let i=0;i<150;i++){

let s=document.createElement("div");

s.className="star";

s.style.left=Math.random()*100+"vw";

s.style.top=Math.random()*100+"vh";

s.style.animationDelay=Math.random()*3+"s";

document.body.appendChild(s);

}

for(let i=0;i<70;i++){

let h=document.createElement("div");

h.className="heart";

h.innerHTML=Math.random()>0.5?"❤️":"🌹";

h.style.left=Math.random()*100+"vw";

h.style.animationDuration=(4+Math.random()*5)+"s";

h.style.animationDelay=Math.random()*5+"s";

h.style.fontSize=(18+Math.random()*18)+"px";

document.body.appendChild(h);

}

function openLove(const text=`Eli ❤️

لە هەر ساتێکی ژیانمدا
تۆ جوانترین دیاری خودایت.

سوپاس بۆ هەموو خەندەکانت،
سوپاس بۆ هەموو خۆشەویستییەکانت.

هەمیشە خۆشم دەوێیت.

Forever ❤️
Araz`;

const box=document.getElementById("msg");
box.innerHTML="";

let i=0;

function type(){
    if(i<text.length){
        box.innerHTML+=text.charAt(i).replace("\n","<br>");
        i++;
        setTimeout(type,50);
    }
}

type();){

document.getElementById("msg").style.display="block";

}
// 🌙 Moon
const moon=document.createElement("div");
moon.style.position="absolute";
moon.style.width="140px";
moon.style.height="140px";
moon.style.borderRadius="50%";
moon.style.background="#fff9c4";
moon.style.boxShadow="0 0 80px #fff";
moon.style.top="40px";
moon.style.right="40px";
moon.style.zIndex="1";
document.body.appendChild(moon);

// ✨ Sparkles
for(let i=0;i<80;i++){
 let s=document.createElement("div");
 s.style.position="absolute";
 s.style.width="4px";
 s.style.height="4px";
 s.style.borderRadius="50%";
 s.style.background="#fff";
 s.style.left=Math.random()*100+"vw";
 s.style.top=Math.random()*100+"vh";
 s.style.opacity=Math.random();
 s.style.animation="twinkle 2s infinite";
 document.body.appendChild(s);
}

// 🌹 Roses
for(let i=0;i<25;i++){
 let r=document.createElement("div");
 r.innerHTML="🌹";
 r.style.position="absolute";
 r.style.left=Math.random()*100+"vw";
 r.style.top="-50px";
 r.style.fontSize=(20+Math.random()*20)+"px";
 r.style.animation=`fall ${6+Math.random()*6}s linear infinite`;
 r.style.animationDelay=Math.random()*6+"s";
 document.body.appendChild(r);
}

// 🦋 Butterflies
for(let i=0;i<12;i++){
 let b=document.createElement("div");
 b.innerHTML="🦋";
 b.style.position="absolute";
 b.style.left=Math.random()*100+"vw";
 b.style.top=Math.random()*100+"vh";
 b.style.fontSize="28px";

 let x=Math.random()*120-60;
 let y=Math.random()*120-60;

 b.animate([
   {transform:"translate(0,0)"},
   {transform:`translate(${x}px,${y}px)`},
   {transform:"translate(0,0)"}
 ],{
   duration:5000+Math.random()*3000,
   iterations:Infinity
 });

 document.body.appendChild(b);
}
 const big=document.createElement("div");

big.innerHTML="❤️";

big.style.position="fixed";
big.style.bottom="30px";
big.style.right="30px";
big.style.fontSize="70px";

big.animate([
{transform:"scale(1)"},
{transform:"scale(1.3)"},
{transform:"scale(1)"}
],{
duration:900,
iterations:Infinity
});

document.body.appendChild(big);
</script>

</body>
</html>
